name: Deploy documentation

on:
  push:
    branches:
      - main
    paths:
      - apps/docs/**
      - .github/workflows/deploy-docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install documentation dependencies
        run: python -m pip install -r apps/docs/requirements.txt

      - name: Build documentation
        run: python -m mkdocs build --config-file apps/docs/mkdocs.yml --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
